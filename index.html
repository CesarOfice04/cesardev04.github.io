            <div class="about-card reveal reveal--delay-1">

                    <div class="about-photo">
                        <img class="img-one" src="img.jpg" alt="Cesar Chiquito">
                    </div>
                    <div class="about-copy">
                        <p class="p1" data-lang-en="My name is Cesar Chiquito, and I am a Systems Engineer, graduated from UNEFA University. I have a strong passion for programming and have participated in system upgrade projects at Petroleos de Venezuela S.A." data-lang-es="Mi nombre es Cesar Chiquito, soy Ingeniero de Sistemas, graduado de la Universidad UNEFA. Tengo una gran pasión por la programación y he participado en proyectos de actualización de sistemas en Petróleos de Venezuela S.A."></p>
                        <p class="p2" data-lang-en="With experience in various programming languages and development tools, such as:" data-lang-es="Con experiencia en varios lenguajes de programación y herramientas de desarrollo, tales como:"></p>

                    <div class="slide-track"></div>
                </div>

                <p class="p3" data-lang-en="With the ability to develop intuitive and user-friendly projects, I focus on creating experiences that are accessible and enjoyable. My goal is to understand the needs of the end user, applying best practices in usability and design to provide effective and visually appealing solutions. I am committed to innovation and quality in every project." data-lang-es="Con la capacidad de desarrollar proyectos intuitivos y amigables para el usuario, me enfoco en crear experiencias que sean accesibles y agradables. Mi objetivo es entender las necesidades del usuario final, aplicando las mejores prácticas en usabilidad y diseño para proporcionar soluciones efectivas y visualmente atractivas. Estoy comprometido con la innovación y la calidad en cada proyecto."></p>
            </div>
        </div>
    </section>

        <p class="p-port portfolio-intro reveal reveal--delay-1"
           data-lang-en="Welcome to my portfolio, where I showcase programming projects that highlight my ability to create effective, user-centered solutions."

    <section class="section section-contact" id="contact">
        <div class="contact-inner reveal">
            <h2 data-lang-en="CONTACT ME" data-lang-es="CONTACTAME"></h2>
            <p class="contact-lead" data-lang-en="Have a project in mind? Write to me." data-lang-es="¿Tienes un proyecto en mente? Escríbeme."></p>

            <form id="form" class="contact-form">
                <div class="form-group">
                    <label class="label-input" for="name" data-lang-en="Name:" data-lang-es="Nombre:"></label>
                    <input type="text" id="name" name="name" placeholder="Tu nombre" data-placeholder-en="Your name" data-placeholder-es="Tu nombre" required>
                </div>
                <div class="form-group">
                    <label class="label-input" for="email" data-lang-en="Email:" data-lang-es="Correo Electrónico:"></label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label class="label-input" for="message" data-lang-en="Message:" data-lang-es="Mensaje:"></label>
                    <textarea id="message" name="message" placeholder="Escribe tu mensaje aquí..." data-placeholder-en="Write your message here..." data-placeholder-es="Escribe tu mensaje aquí..." required></textarea>
                </div>
                <div class="form-group">
                    <input type="submit" id="button" value="Send Email" class="submit-button" data-lang-en="Send Email" data-lang-es="Enviar Correo"/>
                </div>
            </form>
        </div>
